services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: citas_medicas_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # IMPORTANTE: Mapeamos tu SQL para que se cargue al iniciar
      - ./bk_basededatos.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
